name: Autograding Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install jupyter nbconvert pytest

    - name: testnotebookexecution
      id: testnotebookexecution
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Notebook Execution"
        setup-command: pip install matplotlib opencv-python && python3 -c "import base64; exec(base64.b64decode('').decode())"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 10

    - name: testnotebookimports
      id: testnotebookimports
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Notebook Imports"
        setup-command: pip install matplotlib opencv-python && python3 -c "import base64; exec(base64.b64decode('').decode())"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 15

    - name: testimageloading
      id: testimageloading
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Loading"
        setup-command: pip install matplotlib opencv-python && python3 -c "import base64; exec(base64.b64decode('').decode())"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 15

    - name: testimageconversion
      id: testimageconversion
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Conversion"
        setup-command: pip install matplotlib opencv-python && python3 -c "import base64; exec(base64.b64decode('').decode())"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testimagedisplay
      id: testimagedisplay
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Image Display"
        setup-command: pip install matplotlib opencv-python && python3 -c "import base64; exec(base64.b64decode('').decode())"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: testchannelextraction
      id: testchannelextraction
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Test Channel Extraction"
        setup-command: pip install matplotlib opencv-python && python3 -c "import base64; exec(base64.b64decode('').decode())"
        command: jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=120 notebook.ipynb --stdout
        timeout: 90
        max-score: 20

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TESTNOTEBOOKEXECUTION_RESULTS: "${{steps.testnotebookexecution.outputs.result}}"
        TESTNOTEBOOKIMPORTS_RESULTS: "${{steps.testnotebookimports.outputs.result}}"
        TESTIMAGELOADING_RESULTS: "${{steps.testimageloading.outputs.result}}"
        TESTIMAGECONVERSION_RESULTS: "${{steps.testimageconversion.outputs.result}}"
        TESTIMAGEDISPLAY_RESULTS: "${{steps.testimagedisplay.outputs.result}}"
        TESTCHANNELEXTRACTION_RESULTS: "${{steps.testchannelextraction.outputs.result}}"
      with:
        runners: testnotebookexecution,testnotebookimports,testimageloading,testimageconversion,testimagedisplay,testchannelextraction
